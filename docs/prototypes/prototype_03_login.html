<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>救灾中枢 · 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-primary: #0F1419; --bg-secondary: #1A1F2E; --bg-tertiary: #252B3D; --bg-elevated: #2D3548;
    --border-subtle: #2A3142; --border-default: #3A4258; --border-strong: #4D5670;
    --text-primary: #E6EAF2; --text-secondary: #9BA3B8; --text-tertiary: #5C6580;
    --accent-primary: #3B82F6; --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
    --robot-aerial: #60A5FA; --robot-ground: #A78BFA; --robot-marine: #22D3EE;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    margin: 0; min-height: 100vh; overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }

  /* 左侧装饰背景 */
  .left-decor {
    background:
      radial-gradient(circle at 20% 30%, rgba(59,130,246,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(16,185,129,0.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(245,158,11,0.05) 0%, transparent 60%),
      var(--bg-secondary);
  }

  .grid-bg {
    background-image:
      linear-gradient(rgba(58,66,88,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58,66,88,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .input-field {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    width: 100%;
    transition: all 0.15s;
  }
  .input-field:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .input-field::placeholder { color: var(--text-tertiary); }

  .role-option {
    flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border-default);
    background: var(--bg-tertiary);
    text-align: center;
  }
  .role-option:hover { border-color: var(--border-strong); }
  .role-selected { border-color: var(--accent-primary); background: rgba(59,130,246,0.1); box-shadow: 0 0 0 1px var(--accent-primary); }

  .btn-primary {
    background: linear-gradient(90deg, var(--accent-primary), #2563EB);
    color: white; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; width: 100%; transition: all 0.15s;
    box-shadow: 0 4px 12px rgba(59,130,246,0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59,130,246,0.35); }

  /* 浮动机器人动画 */
  .robot-icon { position: absolute; opacity: 0.4; animation: float 8s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
  .pulse-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .check-box { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="h-screen flex">

  <!-- 左侧装饰区 -->
  <div class="flex-1 left-decor grid-bg relative flex flex-col justify-between p-12 overflow-hidden">

    <!-- 顶部 Logo -->
    <div class="flex items-center gap-3 z-10">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: rgba(59,130,246,0.2); border: 1px solid var(--accent-primary);">
        <i data-lucide="shield-check" class="w-7 h-7" style="color: var(--accent-primary);"></i>
      </div>
      <div>
        <div class="text-xl font-bold">救灾中枢</div>
        <div class="text-xs mono" style="color: var(--text-tertiary);">Disaster Rescue Hub</div>
      </div>
    </div>

    <!-- 中央插画区 -->
    <div class="relative flex-1 flex items-center justify-center">
      <!-- 浮动机器人 -->
      <div class="robot-icon" style="top: 20%; left: 15%; animation-delay: 0s;">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="20" fill="none" stroke="#60A5FA" stroke-width="2"/>
          <path d="M 22 28 L 38 28 L 35 36 L 25 36 Z" fill="#60A5FA"/>
        </svg>
      </div>
      <div class="robot-icon" style="top: 60%; left: 70%; animation-delay: 2s;">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <rect x="15" y="15" width="30" height="30" rx="4" fill="none" stroke="#A78BFA" stroke-width="2"/>
          <rect x="22" y="22" width="16" height="16" rx="2" fill="#A78BFA"/>
        </svg>
      </div>
      <div class="robot-icon" style="top: 30%; left: 75%; animation-delay: 4s;">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <polygon points="30,15 45,40 15,40" fill="none" stroke="#22D3EE" stroke-width="2"/>
          <circle cx="30" cy="32" r="5" fill="#22D3EE"/>
        </svg>
      </div>
      <div class="robot-icon" style="top: 70%; left: 20%; animation-delay: 1s;">
        <svg width="50" height="50" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="18" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
          <path d="M 24 28 L 36 28 L 34 34 L 26 34 Z" fill="#60A5FA"/>
        </svg>
      </div>

      <!-- 中央核心 -->
      <div class="text-center z-10 relative">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-2xl mb-4" style="background: rgba(59,130,246,0.15); border: 2px solid var(--accent-primary); box-shadow: 0 0 60px rgba(59,130,246,0.3);">
          <i data-lucide="radio-tower" class="w-12 h-12" style="color: var(--accent-primary);"></i>
        </div>
        <div class="text-2xl font-bold mb-2">异构多机器人协同指挥中枢</div>
        <div class="text-sm" style="color: var(--text-secondary);">海陆空协同 · 智能调度 · 人机共治</div>

        <!-- 指标卡片 -->
        <div class="flex gap-3 mt-8 justify-center">
          <div class="px-5 py-3 rounded-lg" style="background: rgba(26,31,46,0.8); border: 1px solid var(--border-subtle); backdrop-filter: blur(8px);">
            <div class="text-xs" style="color: var(--text-tertiary);">在线机器人</div>
            <div class="text-xl font-bold mono" style="color: var(--success);">25</div>
          </div>
          <div class="px-5 py-3 rounded-lg" style="background: rgba(26,31,46,0.8); border: 1px solid var(--border-subtle); backdrop-filter: blur(8px);">
            <div class="text-xs" style="color: var(--text-tertiary);">活跃会话</div>
            <div class="text-xl font-bold mono" style="color: var(--accent-primary);">3</div>
          </div>
          <div class="px-5 py-3 rounded-lg" style="background: rgba(26,31,46,0.8); border: 1px solid var(--border-subtle); backdrop-filter: blur(8px);">
            <div class="text-xs flex items-center gap-1.5" style="color: var(--text-tertiary);"><span class="pulse-dot"></span>系统运行</div>
            <div class="text-xl font-bold mono" style="color: var(--text-primary);">正常</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部 Slogan -->
    <div class="z-10 text-xs flex items-center justify-between" style="color: var(--text-tertiary);">
      <div class="mono">© 2026 Disaster Rescue Hub · v1.0</div>
      <div class="flex items-center gap-4">
        <span>[Powered by FastAPI + React]</span>
      </div>
    </div>
  </div>

  <!-- 右侧登录卡 -->
  <div class="w-[480px] flex items-center justify-center p-12" style="background: var(--bg-primary);">
    <div class="w-full max-w-sm">

      <!-- 标题 -->
      <div class="mb-8">
        <h1 class="text-2xl font-bold mb-2">欢迎登录</h1>
        <p class="text-sm" style="color: var(--text-secondary);">使用您的指挥员或管理员账号登录系统</p>
      </div>

      <!-- 角色选择 -->
      <div class="mb-5">
        <label class="text-xs font-semibold mb-2 block" style="color: var(--text-secondary);">选择登录身份</label>
        <div class="flex gap-3">
          <div class="role-option role-selected">
            <i data-lucide="crosshair" class="w-5 h-5 mx-auto mb-1.5" style="color: var(--accent-primary);"></i>
            <div class="text-sm font-semibold">指挥员</div>
            <div class="text-xs mt-0.5" style="color: var(--text-tertiary);">Commander</div>
          </div>
          <div class="role-option">
            <i data-lucide="settings" class="w-5 h-5 mx-auto mb-1.5" style="color: var(--text-secondary);"></i>
            <div class="text-sm font-semibold">管理员</div>
            <div class="text-xs mt-0.5" style="color: var(--text-tertiary);">Admin</div>
          </div>
        </div>
      </div>

      <!-- 用户名 -->
      <div class="mb-4">
        <label class="text-xs font-semibold mb-2 block" style="color: var(--text-secondary);">用户名</label>
        <div class="relative">
          <i data-lucide="user" class="w-4 h-4 absolute left-3 top-3.5" style="color: var(--text-tertiary);"></i>
          <input type="text" class="input-field pl-10" placeholder="请输入用户名" value="commander001">
        </div>
      </div>

      <!-- 密码 -->
      <div class="mb-4">
        <label class="text-xs font-semibold mb-2 block" style="color: var(--text-secondary);">密码</label>
        <div class="relative">
          <i data-lucide="lock" class="w-4 h-4 absolute left-3 top-3.5" style="color: var(--text-tertiary);"></i>
          <input type="password" class="input-field pl-10 pr-10" placeholder="请输入密码" value="dummy_password">
          <button class="absolute right-3 top-3.5">
            <i data-lucide="eye" class="w-4 h-4" style="color: var(--text-tertiary);"></i>
          </button>
        </div>
      </div>

      <!-- 选项 -->
      <div class="flex items-center justify-between mb-6 text-xs">
        <label class="flex items-center gap-2 cursor-pointer">
          <span class="check-box" style="background: var(--accent-primary); border-color: var(--accent-primary);">
            <i data-lucide="check" class="w-3 h-3 text-white"></i>
          </span>
          <span style="color: var(--text-secondary);">记住我</span>
        </label>
        <a href="#" class="font-semibold" style="color: var(--accent-primary);">忘记密码?</a>
      </div>

      <!-- 登录按钮 -->
      <button class="btn-primary mb-4 flex items-center justify-center gap-2">
        登 录
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>

      <!-- 提示 -->
      <div class="text-center text-xs" style="color: var(--text-tertiary);">
        <p>登录即表示您同意系统使用规范与审计政策</p>
      </div>

      <!-- 底部分割 -->
      <div class="mt-12 pt-6 border-t" style="border-color: var(--border-subtle);">
        <div class="text-xs space-y-1.5" style="color: var(--text-tertiary);">
          <div class="flex items-center justify-between">
            <span>系统版本</span>
            <span class="mono">v1.0.0</span>
          </div>
          <div class="flex items-center justify-between">
            <span>API 状态</span>
            <span class="flex items-center gap-1.5"><span class="pulse-dot"></span><span style="color: var(--success);">在线</span></span>
          </div>
          <div class="flex items-center justify-between">
            <span>WebSocket</span>
            <span class="flex items-center gap-1.5"><span class="pulse-dot"></span><span style="color: var(--success);">已连接</span></span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>lucide.createIcons();</script>
</body>
</html>
